name: API Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel any in-progress run for the same branch/PR
concurrency:
  group: api-tests-${{ github.head_ref || github.sha }}
  cancel-in-progress: true

jobs:
  api-tests:
    name: API Tests
    runs-on: ubuntu-latest
    # API tests have no browser overhead — 10 minutes is generous
    timeout-minutes: 10

    # ParaBank service is available in CI if tests ever need to target a local container.
    # The default TEST_ENV remains `staging` — this service block is additive, not a default switch.
    # --health-retries 12 at 10 s intervals gives ~2 minutes for Tomcat's cold start.
    services:
      parabank:
        image: parasoft/parabank
        ports:
          - 8080:8080
        options: >-
          --health-cmd "curl -f http://localhost:8080/parabank/index.htm || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 12

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          # Pinned to 20 — matches the runtime version used in local dev
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # No browser installation needed — API tests use Playwright's request context only

      - name: Run API tests
        # CI env var drives forbidOnly and retries in playwright.api.config.js
        run: npm run test:api
        env:
          CI: true
          TEST_ENV: staging

      # Artifact name allure-results-api is expected by the publish-report job
      # in ui-tests.yml which downloads pattern: allure-results-* to merge all results
      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-api
          path: allure-results/
          retention-days: 30
